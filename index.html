<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Oxygen:wght@300;400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <title>Weather App</title>
</head>
<body>

    <div class="container">
    <header>
        
            <form id="form-element">
                <input type ="text" placeholder="Seach for City" required class="search-city" id="search-engen"/>
                <input type="submit" class="submit-button id="submit-button"/>
            </form>
        </header>
        <main>
        <hr />
        
            <h1 id="city"></h1>

            <p>
            <div class="forecast">
            Sunday 20:13, Rainy
            <br />
            humidity <span class="elements">90%</span>, Wind speed <span class="elements">40 km/h</span>
            </div>
            

            <div class="current-temperature">
                <span class="weather-icon">🌩</span>
                <span class="weather-temperature" id="current-temperature"></span>
                <span class="weather-units">°C</span>
            </div>
            </p>
            
        <br /> 
        <hr />
    </main>
    

    <footer>
     Coded by <a href="https://github.com/QhamaniMagasana">Qhamani Magasana</a> on <a href="https://github.com/QhamaniMagasana/Imozulu-App">GitHub</a> hosted on <a href ="https://imozulu-project.netlify.app/">Netlify</a>.
    </footer>
</div>


    <script src="index.js"></script>
</body>
</html>
